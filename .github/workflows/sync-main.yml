name: Auto-Sync Develop to Main

on:
  push:
    branches:
      - develop

jobs:
  create-pr-to-main:
    name: Create Merge PR to Main
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore: auto-sync')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open Pull Request
        run: |
          # Use gh cli to create PR
          gh pr create \
            --base main \
            --head develop \
            --title "chore: auto-sync develop to main" \
            --body "This PR was automatically generated by GitHub Actions to sync \`develop\` into \`main\`." \
            --label "auto-sync" || echo "PR already exists or no changes"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
