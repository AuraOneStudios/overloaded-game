name: Auto-Sync Develop to Main

on:
  push:
    branches:
      - develop

jobs:
  create-pr-to-main:
    name: Create Merge PR to Main
    runs-on: ubuntu-latest
    if: >-
      github.actor != 'github-actions[bot]' &&
      !contains(github.event.head_commit.message, 'chore: auto-sync')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check for differences
        id: check_diff
        run: |
          git fetch origin main develop
          if git diff --quiet origin/main..origin/develop; then
            echo "No changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Changes detected."
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if PR already exists
        id: check_pr
        if: steps.check_diff.outputs.has_changes == 'true'
        run: |
          existing_pr=$(gh pr list --head develop --base main --state open --json number --jq '.[0].number')
          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #$existing_pr"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "No existing PR found."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open Pull Request
        if: steps.check_diff.outputs.has_changes == 'true' && steps.check_pr.outputs.exists == 'false'
        run: |
          gh pr create \
            --base main \
            --head develop \
            --title "chore: auto-sync develop to main" \
            --body "This PR was automatically generated by GitHub Actions to sync \`develop\` into \`main\`."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
