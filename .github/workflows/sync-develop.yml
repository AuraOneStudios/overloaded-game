name: Auto-Sync Main to Develop

on:
  push:
    branches:
      - main

jobs:
  create-pr-to-develop:
    name: Create Merge PR to Develop
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, 'chore: auto-sync') }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Open Pull Request
        run: |
          # Use gh cli to create PR
          gh pr create \
            --base develop \
            --head main \
            --title "chore: auto-sync main to develop" \
            --body "This PR was automatically generated by GitHub Actions to sync \`main\` back into \`develop\`. This ensures that any hotfixes or merge commits made on \`main\` are reflected in the development branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
