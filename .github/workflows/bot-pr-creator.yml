name: Create PRs as Bot
on:
  push:
    branches:
      - chore/bot-prs

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create PRs
        run: |
          gh pr create --base develop --head chore/clean-docs-images --title "chore(docs): clean up unused development images from landing page" --body "This PR was automatically recreated by github-actions[bot]." || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
